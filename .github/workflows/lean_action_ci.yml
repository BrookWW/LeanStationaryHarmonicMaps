name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - name: Build public example
        run: lake build LeanStationaryHarmonicMaps.Examples.StationaryMonotonicity
      - name: Build main theorem example
        run: lake build LeanStationaryHarmonicMaps.Examples.UseMainTheorem
